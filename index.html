<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كابتن جم جم ⚽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

        :root {
            --gold: #ffd700;
            --gold-light: #fff0a0;
            --gold-dark: #c8a800;
            --bg: #0c0c0c;
            --card-bg: #161616;
            --border: rgba(255,215,0,0.2);
            --border-hover: rgba(255,215,0,0.5);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.5);
            --radius: 20px;
            --shadow-gold: 0 0 30px rgba(255,215,0,0.15);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,215,0,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 80% 100%, rgba(255,150,0,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #confetti-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== HEADER ===== */
        .site-header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 36px 20px 24px;
            border-bottom: 1px solid rgba(255,215,0,0.08);
        }

        .logo-ball {
            font-size: 3rem;
            display: block;
            margin-bottom: 8px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .site-title {
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), #fff8dc, var(--gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 4s linear infinite;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 6px 20px;
            background: rgba(255,215,0,0.07);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--gold);
        }

        /* ===== MAIN WRAPPER ===== */
        .pw {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        /* ===== CATEGORY PILL ===== */
        .cat-pill {
            display: block;
            width: fit-content;
            margin: 0 auto 28px;
            padding: 8px 24px;
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 0.5px;
            animation: pulsePill 2.5s ease-in-out infinite;
        }

        @keyframes pulsePill {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,215,0,0.2); }
            50% { box-shadow: 0 0 0 8px rgba(255,215,0,0); }
        }

        /* ===== QUESTION BLOCK ===== */
        .q-block {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 24px 24px;
            margin-bottom: 20px;
            position: relative;
            transition: border-color 0.3s, box-shadow 0.3s;
            animation: slideUp 0.6s ease both;
        }

        .q-block:nth-child(2) { animation-delay: 0.1s; }
        .q-block:nth-child(3) { animation-delay: 0.2s; }
        .q-block:nth-child(4) { animation-delay: 0.3s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .q-block:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-gold);
        }

        /* Number tag */
        .q-num {
            position: absolute;
            top: -14px;
            right: 20px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            font-weight: 900;
            font-size: 0.82rem;
            padding: 4px 16px;
            border-radius: 50px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(255,215,0,0.3);
        }

        /* Divider accent line */
        .q-block::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 60%;
            background: linear-gradient(180deg, var(--gold), transparent);
            border-radius: 0 var(--radius) 0 0;
            transform: translateY(20%);
        }

        .q-text {
            font-size: clamp(1.15rem, 3.5vw, 1.5rem);
            font-weight: 800;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 22px;
            padding-top: 4px;
        }

        /* ===== REVEAL BUTTON ===== */
        .btn-reveal {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            font-family: 'Cairo', sans-serif;
            font-size: 1.05rem;
            font-weight: 900;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 6px 20px rgba(255,215,0,0.25);
        }

        .btn-reveal:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255,215,0,0.4);
        }

        .btn-reveal:active { transform: scale(0.98); }
        .btn-reveal.hidden { display: none; }

        /* ===== ANSWER SECTION ===== */
        .ans-section {
            display: none;
            margin-top: 18px;
        }

        .ans-section.show {
            display: block;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .ans-box {
            background: linear-gradient(135deg, rgba(255,215,0,0.06), rgba(255,215,0,0.02));
            border: 1.5px solid rgba(255,215,0,0.35);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .ans-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 1px;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .ans-text {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 900;
            color: #fff;
            margin-bottom: 18px;
            text-shadow: 0 2px 10px rgba(255,215,0,0.2);
        }

        .points-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            font-size: 1rem;
            font-weight: 900;
            padding: 8px 22px;
            border-radius: 50px;
            box-shadow: 0 4px 16px rgba(255,215,0,0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .site-header { padding: 28px 16px 20px; }
            .pw { padding: 20px 12px 50px; }
            .q-block { padding: 28px 18px 20px; }
            .q-text { font-size: 1.1rem; }
        }

        /* ===== SELECTION GRID ===== */
        .selection-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 24px;
            text-shadow: 0 0 10px rgba(255,215,0,0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 14px;
            margin-bottom: 30px;
        }

        .qcard {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .qcard:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow-gold);
        }

        .qcard__num {
            font-size: 1.9rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .qcard__cat {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }

        .dashboard-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: rgba(255,215,0,0.05);
            border: 1px dashed var(--border);
            color: var(--gold);
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            transition: background 0.2s, border-color 0.2s;
            font-size: 0.95rem;
        }

        .dashboard-link:hover {
            background: rgba(255,215,0,0.1);
            border-color: var(--gold);
        }
    </style>
</head>
<body>
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<!-- HEADER -->
<header class="site-header" id="site-header">
    <span class="logo-ball">⚽</span>
    <h1 class="site-title">كابتن جم جم</h1>
    <div class="card-badge" id="card-badge-header">
        <span>🃏</span>
        <span id="card-number">جاري التحميل...</span>
    </div>
</header>

<!-- MAIN CONTENT -->
<div class="pw" id="main-wrap">

    <!-- Card Selection Screen -->
    <div id="selection-view" style="display:none">
        <h2 class="selection-title">اختر الكارت للعب ⚽</h2>
        <div class="grid" id="selection-grid"></div>
        <div style="display: flex; gap: 12px; flex-direction: column;">
            <a href="card.html" class="dashboard-link">⚙️ الذهاب إلى لوحة التحكم (card.html)</a>
            <a href="card (2).html" class="dashboard-link">⚙️ الذهاب إلى لوحة التحكم (card (2).html)</a>
        </div>
    </div>

    <span class="cat-pill" id="cat-badge" style="display:none">⚽ أسئلة عامة</span>

    <!-- Block 1 -->
    <div class="q-block" id="block1" style="display:none">
        <div class="q-num">السؤال الأول</div>
        <p class="q-text" id="qtxt1"></p>
        <button class="btn-reveal" id="btn-reveal1" onclick="reveal(1)">
            <span>⚽</span><span>إظهار الإجابة</span>
        </button>
        <div class="ans-section" id="ans-sec1">
            <div class="ans-box">
                <div class="ans-label"><span>✅</span><span>الإجابة الصحيحة</span></div>
                <p class="ans-text" id="atxt1"></p>
                <div class="points-badge"><span>🏆</span><span id="pval1"></span></div>
            </div>
        </div>
    </div>

    <!-- Block 2 -->
    <div class="q-block" id="block2" style="display:none">
        <div class="q-num">السؤال الثاني</div>
        <p class="q-text" id="qtxt2"></p>
        <button class="btn-reveal" id="btn-reveal2" onclick="reveal(2)">
            <span>⚽</span><span>إظهار الإجابة</span>
        </button>
        <div class="ans-section" id="ans-sec2">
            <div class="ans-box">
                <div class="ans-label"><span>✅</span><span>الإجابة الصحيحة</span></div>
                <p class="ans-text" id="atxt2"></p>
                <div class="points-badge"><span>🏆</span><span id="pval2"></span></div>
            </div>
        </div>
    </div>

    <!-- Block 3 -->
    <div class="q-block" id="block3" style="display:none">
        <div class="q-num">السؤال الثالث</div>
        <p class="q-text" id="qtxt3"></p>
        <button class="btn-reveal" id="btn-reveal3" onclick="reveal(3)">
            <span>⚽</span><span>إظهار الإجابة</span>
        </button>
        <div class="ans-section" id="ans-sec3">
            <div class="ans-box">
                <div class="ans-label"><span>✅</span><span>الإجابة الصحيحة</span></div>
                <p class="ans-text" id="atxt3"></p>
                <div class="points-badge"><span>🏆</span><span id="pval3"></span></div>
            </div>
        </div>
    </div>



</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="default-cards.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCAd9UETOYGKhLQo_is6CTNvoOBGaejbmY",
  authDomain: "gmgm2-2ad05.firebaseapp.com",
  projectId: "gmgm2-2ad05",
  storageBucket: "gmgm2-2ad05.firebasestorage.app",
  messagingSenderId: "879475150068",
  appId: "1:879475150068:web:f0c28b8a4bebdbaa3b22a1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const up = new URLSearchParams(window.location.search);
const qid = up.get('id');

// Confetti
const cnv = document.getElementById('confetti-canvas');
const ctx = cnv.getContext('2d');
let pcs = [], aid = null;
const CL = ['#ffd700','#ffb300','#ffffff','#fffacd','#ffec8b','#daa520'];
function rsz(){cnv.width=innerWidth;cnv.height=innerHeight;}
addEventListener('resize',rsz); rsz();
function mp(){return{x:Math.random()*cnv.width,y:-20,w:Math.random()*10+5,h:Math.random()*6+3,color:CL[Math.floor(Math.random()*CL.length)],rot:Math.random()*360,rs:(Math.random()-.5)*10,vx:(Math.random()-.5)*3,vy:Math.random()*3+1.5,amp:Math.random()*3,spd:Math.random()*.04+.01,ph:Math.random()*Math.PI*2,op:1};}
function launchConfetti(){for(var j=0;j<200;j++)pcs.push(mp());if(!aid)anim();}
function anim(){ctx.clearRect(0,0,cnv.width,cnv.height);pcs.forEach(function(p){p.ph+=p.spd;p.x+=p.vx+Math.sin(p.ph)*p.amp;p.y+=p.vy;p.rot+=p.rs;if(p.y>cnv.height*.7)p.op-=.02;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=Math.max(p.op,0);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});pcs=pcs.filter(function(p){return p.y<cnv.height+30&&p.op>0;});if(pcs.length>0){aid=requestAnimationFrame(anim);}else{aid=null;ctx.clearRect(0,0,cnv.width,cnv.height);}}

function reveal(num) {
    document.getElementById('btn-reveal'+num).classList.add('hidden');
    document.getElementById('ans-sec'+num).classList.add('show');
    launchConfetti();
}

function initGame(D) {
    document.getElementById('card-number').textContent = 'الكارت رقم ' + (qid || '?');
    const catEl = document.getElementById('cat-badge');
    catEl.textContent = '⚽ ' + (D.category || 'أسئلة عامة');
    catEl.style.display = 'block';
    


    function setupBlock(n, q, a, p) {
        if (q) {
            document.getElementById('block'+n).style.display = 'block';
            document.getElementById('qtxt'+n).textContent = q;
            document.getElementById('atxt'+n).textContent = a || '---';
            document.getElementById('pval'+n).textContent = p || '1 نقطة';
        }
    }

    setupBlock(1, D.q1, D.a1, D.p1);
    setupBlock(2, D.q2, D.a2, D.p2);
    setupBlock(3, D.q3, D.a3, D.p3);

    if (!D.q1 && !D.q2 && !D.q3) {
        document.getElementById('block1').style.display = 'block';
        document.getElementById('qtxt1').textContent = 'لا توجد أسئلة في هذا الكارت بعد';
        document.getElementById('btn-reveal1').style.display = 'none';
    }
}

function loadSelectionScreen() {
    document.getElementById('card-badge-header').style.display = 'none';
    const selectionView = document.getElementById('selection-view');
    selectionView.style.display = 'block';
    
    const grid = document.getElementById('selection-grid');
    grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted)">جاري تحميل الكروت...</p>';

    db.collection('questions').get().then(function(snap) {
        let cards = [];
        const dbIds = new Set();
        snap.forEach(function(doc) {
            cards.push({id: doc.id, category: doc.data().category});
            dbIds.add(doc.id);
        });

        // Add local cards
        for (const id in localCards) {
            if (!dbIds.has(id)) {
                cards.push({id: id, category: localCards[id].category});
            }
        }

        cards.sort((a,b) => parseInt(a.id) - parseInt(b.id));
        renderSelectionGrid(cards);
    }).catch(function(err) {
        console.error("Firestore loading failed, using local cards:", err);
        let cards = [];
        for (const id in localCards) {
            cards.push({id: id, category: localCards[id].category});
        }
        cards.sort((a,b) => parseInt(a.id) - parseInt(b.id));
        renderSelectionGrid(cards);
    });
}

function renderSelectionGrid(cards) {
    const grid = document.getElementById('selection-grid');
    grid.innerHTML = '';
    
    if (cards.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted)">لا توجد كروت متاحة</p>';
        return;
    }

    cards.forEach(function(card) {
        const c = document.createElement('div');
        c.className = 'qcard';
        c.onclick = function() {
            window.location.search = '?id=' + card.id;
        };
        c.innerHTML = '<div class="qcard__num">' + card.id + '</div><div class="qcard__cat">' + (card.category || 'أسئلة عامة') + '</div>';
        grid.appendChild(c);
    });
}

if (qid) {
    db.collection('questions').doc(qid).get().then(function(doc){
        if (doc.exists) {
            initGame(doc.data());
        } else {
            const localData = localCards[qid];
            if (localData) {
                initGame(localData);
            } else {
                document.getElementById('card-number').textContent = 'غير موجود';
                initGame({q1: 'هذا الكارت لم يضاف بعد', category: 'خطأ'});
            }
        }
    }).catch(function(err){
        console.error("Firestore read failed, falling back to localCards:", err);
        const localData = localCards[qid];
        if (localData) {
            initGame(localData);
        } else {
            document.getElementById('card-number').textContent = 'خطأ اتصال';
            initGame({q1: 'حدث خطأ في الاتصال', category: 'خطأ'});
        }
    });
} else {
    loadSelectionScreen();
}
</script>
</body>
</html>
